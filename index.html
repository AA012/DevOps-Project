<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevOps CI/CD</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            padding-top: 100px;
        }

        h1 {
            color: #2c3e50;
        }

        .container {
            background: white;
            padding: 40px;
            margin: auto;
            width: 50%;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        button {
            padding: 10px 20px;
            background: #3498db;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #2980b9;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>DevOps CI/CD Pipeline Demo</h1>
    <p>This page is automatically deployed using Jenkins.</p>

    <button onclick="showMessage()">Click to Test JavaScript</button>

    <p id="message"></p>
</div>

<script>
function showMessage() {
    document.getElementById("message").innerHTML =
    "Deployment Successful! Jenkins CI/CD pipeline is working.";
}
</script>

</body>
</html>
